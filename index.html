<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - Live N Move</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    padding:15px;
    background:#161616;
    text-align:center;
    font-weight:bold;
    font-size:18px;
    border-bottom:1px solid #222;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:70%;
    padding:12px 16px;
    margin:10px 0;
    border-radius:12px;
    line-height:1.4;
}

.user{
    background:#2563eb;
    align-self:flex-end;
    margin-left:auto;
}

.bot{
    background:#2a2a2a;
    align-self:flex-start;
}

#inputArea{
    display:flex;
    padding:15px;
    background:#161616;
    border-top:1px solid #222;
}

#input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#2a2a2a;
    color:white;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}
</style>
</head>

<body>

<header>AI Chat</header>

<div id="chat"></div>

<div id="inputArea">
    <input type="text" id="input" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    if(input.value.trim() === "") return;

    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.textContent = input.value;
    chat.appendChild(userMsg);

    const botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.textContent = "This is demo AI reply.";
    chat.appendChild(botMsg);

    input.value="";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
